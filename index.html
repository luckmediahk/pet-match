<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🐶 AnimalsSum | 神速合拍大比拚</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap" rel="stylesheet">
    
    <!-- Firebase & AI Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --brand: #54b97c; --accent: #FFD93D; --danger: #FF6B6B; --dark: #2d3436; }
        body { font-family: 'Noto Sans TC', 'Fredoka', sans-serif; background: linear-gradient(135deg, #e0f7fa 0%, #d4f0df 100%); margin: 0; padding: 20px; min-height: 100vh; color: var(--dark); }
        .container { width: 95%; max-width: 1000px; margin: 0 auto; background: rgba(255,255,255,0.95); border-radius: 30px; padding: 30px; box-sizing: border-box; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        
        header { text-align: center; margin-bottom: 20px; position: relative; }
        .logo-tag { background: var(--dark); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-weight: 800; font-size: 1rem; display: inline-block; }
        .ver-tag { background: #e74c3c; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; margin-left: 5px; vertical-align: super; }
        h1 { font-size: clamp(2rem, 5vw, 3rem); margin: 10px 0 5px; color: var(--brand); text-shadow: 2px 2px 0px #eee; font-weight: 900; }

        .view { display: none; animation: fadeIn 0.4s ease-out; }
        .view.active { display: block; }

        .names-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; background: #eef2f5; padding: 15px; border-radius: 20px; }
        .names-col { flex: 1; min-width: 250px; }
        .names-col label { font-weight: bold; color: #555; display: block; margin-bottom: 5px; font-size: 1rem; text-align: center; }
        .form-input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; font-size: 1.1rem; box-sizing: border-box; text-align: center; transition: 0.3s; }
        .form-input:focus { border-color: var(--brand); outline: none; box-shadow: 0 0 10px rgba(84,185,124,0.3); }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { font-weight: bold; color: #555; display: block; margin-bottom: 8px; font-size: 1.1rem; }

        .main-btn { background: var(--brand); color: white; border: none; width: 100%; padding: 18px; border-radius: 25px; font-size: clamp(1.2rem, 3vw, 1.5rem); font-weight: 800; cursor: pointer; box-shadow: 0 8px 0 #3da065; transition: all 0.1s; margin-top: 10px; }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #3da065; }
        .main-btn:disabled { background: #ccc; box-shadow: 0 8px 0 #999; cursor: not-allowed; }
        .sec-btn { background: #fff; color: var(--brand); border: 2px solid var(--brand); box-shadow: 0 5px 0 var(--brand); }
        .action-btn { background: var(--accent); color: var(--dark); box-shadow: 0 8px 0 #d4a000; }

        .round-box { background: #fff; border-radius: 20px; padding: 15px; border: 2px dashed #ccc; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .round-title { text-align: center; font-weight: 900; color: #fff; margin-bottom: 15px; font-size: 1.3rem; background: #54a0ff; display: inline-block; padding: 8px 25px; border-radius: 20px; margin-left: 50%; transform: translateX(-50%); white-space: nowrap; }
        .match-row { display: flex; gap: 15px; justify-content: center; align-items: stretch; }
        
        .photo-card { flex: 1; background: #f8f9fa; border-radius: 15px; padding: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); position: relative; cursor: pointer; text-align: center; border: 2px solid transparent; transition: 0.2s; display: flex; flex-direction: column; }
        .photo-card:active { transform: scale(0.95); }
        .photo-card.has-img { border-color: var(--brand); background: #fff; }
        
        .img-box { width: 100%; flex-grow: 1; min-height: 180px; border-radius: 10px; overflow: hidden; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; inset: 0; }
        .placeholder { font-size: 4rem; color: #ccc; margin-bottom: 10px; }
        .cam-icon { font-size: 1rem; color: #888; font-weight: bold; background: #eee; padding: 5px 15px; border-radius: 15px; }
        
        .bubble { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 12px; border-radius: 15px; font-size: 0.85rem; font-weight: bold; display: none; z-index: 10; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .bubble.err { background: var(--danger); } .bubble.ok { background: var(--brand); } .bubble.warn { background: var(--accent); color: #333; }

        .result-photos { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 10px 0 20px 0; }
        .res-photo { width: clamp(120px, 20vw, 180px); aspect-ratio: 1/1; border-radius: 50%; border: 6px solid #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.15); overflow: hidden; background: #eee; }
        .res-photo img { width: 100%; height: 100%; object-fit: cover; }
        .res-vs { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; color: var(--accent); font-style: italic; text-shadow: 2px 2px 0px #fff; }

        .score-board { display: flex; justify-content: center; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .score-item.final h4 { margin: 0 0 10px 0; color: #555; font-size: 1.3rem; }
        .score-item.final .val { font-size: clamp(4rem, 8vw, 6rem); color: var(--accent); text-shadow: 3px 3px 0 #333; line-height: 1; font-weight: 900; }

        .funny-verdict-box { background: linear-gradient(135deg, #FFD93D, #FF9F43); padding: 25px; border-radius: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 20px rgba(255, 159, 67, 0.3); animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .funny-label { font-size: 1.1rem; color: rgba(255,255,255,0.9); font-weight: bold; margin-bottom: 10px; letter-spacing: 2px; }
        .funny-text { font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); margin: 0; }

        .detail-bars { background: #f9f9f9; padding: 20px; border-radius: 20px; }
        .detail-bars-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 15px; }
        @media(min-width: 768px) { .detail-bars-grid { grid-template-columns: 1fr 1fr; gap: 25px; } }

        .bar-row { display: flex; align-items: center; font-size: 1.1rem; }
        .bar-label { width: 120px; font-weight: bold; color: #555; }
        .bar-bg { flex: 1; height: 14px; background: #ddd; border-radius: 7px; overflow: hidden; margin: 0 10px; }
        .bar-fill { height: 100%; background: var(--brand); width: 0%; transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .bar-val { width: 75px; font-weight: bold; text-align: right; color: #444; }

        .action-btns-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 25px; }
        @media(min-width: 768px) { .action-btns-grid { grid-template-columns: 1fr 1fr; } }

        .dl-card { background: #fff; border-radius: 20px; padding: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; border: 2px solid #eee; }
        .dl-card h3 { color: var(--brand); margin-top: 0; font-size: 1.3rem; }
        .dl-card img { width: 100%; max-width: 500px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 15px; display: inline-block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popUp { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        #ai-status { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); color: white; padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; }
        #loader { position: fixed; inset:0; background: rgba(255,255,255,0.9); z-index: 999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { font-size: 4rem; animation: spin 2s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <img id="brand-logo" src="./logo.png" crossorigin="anonymous" style="display:none;" onerror="this.src='https://via.placeholder.com/300x100.png?text=ANIMALS+SUM'">

    <div id="loader">
        <div class="spinner">⚙️</div>
        <h2 id="loader-text">大數據運算中...</h2>
    </div>

    <div class="container">
        <header>
            <div id="ai-status">⚙️ AI 準備中...</div>
            <div class="logo-tag">ANIMALSSUM.COM <span class="ver-tag">v26.1</span></div>
            <h1>🐾 神速合拍大比拚</h1>
        </header>

        <!-- VIEW 1: HOME (Staff Mode) -->
        <div id="view-home" class="view">
            <button class="main-btn" style="padding: 40px; font-size: clamp(2rem, 5vw, 3rem); margin-top: 50px;" onclick="switchView('view-upload')">🎮 開始遊戲！</button>
        </div>

        <!-- VIEW 2: UPLOAD (1 Photo) -->
        <div id="view-upload" class="view">
            <div class="names-row">
                <div class="names-col"><label>👤 人類名字</label><input type="text" id="human-name" class="form-input" placeholder="例: 陳大文" oninput="checkAllReady()"></div>
                <div class="names-col"><label>🐶 狗狗名字</label><input type="text" id="dog-name" class="form-input" placeholder="例: 旺財" oninput="checkAllReady()"></div>
            </div>

            <div class="round-box">
                <div class="round-title">📸 拍攝參加者與狗狗 (大頭/全身皆可)</div>
                <div class="match-row">
                    <div class="photo-card" id="box-h-1" onclick="document.getElementById('u-h-1').click()">
                        <div class="bubble" id="b-h-1"></div>
                        <div class="img-box">
                            <span class="placeholder">🧍‍♂️</span><div class="cam-icon">📷 人類就位</div><img id="img-h-1">
                        </div>
                        <input type="file" id="u-h-1" hidden accept="image/*" capture="environment" onchange="checkImg(event, 'img-h-1', 'b-h-1', 'person')">
                    </div>
                    <div style="font-weight:900; color:var(--accent); font-size:2rem; font-style:italic; align-self:center;">VS</div>
                    <div class="photo-card" id="box-d-1" onclick="document.getElementById('u-d-1').click()">
                        <div class="bubble" id="b-d-1"></div>
                        <div class="img-box">
                            <span class="placeholder">🐕</span><div class="cam-icon">📷 主子就位</div><img id="img-d-1">
                        </div>
                        <input type="file" id="u-d-1" hidden accept="image/*" capture="environment" onchange="checkImg(event, 'img-d-1', 'b-d-1', 'dog')">
                    </div>
                </div>
            </div>

            <button id="btn-calc" class="main-btn action-btn" style="margin-top:20px; padding: 25px;" onclick="generateResults()" disabled>⚡ 開始 AI 運算</button>
            <button class="main-btn sec-btn" style="border:none; box-shadow:none; color:#888;" onclick="location.reload()">🔄 重置系統</button>
        </div>

        <!-- VIEW 3: RESULTS -->
        <div id="view-result" class="view">
            <h2 style="text-align:center; margin-bottom:5px; font-size: 2rem;">🏆 <span id="res-names"></span> 嘅配對報告</h2>
            <div class="result-photos"><div class="res-photo"><img id="res-img-h"></div><div class="res-vs">VS</div><div class="res-photo"><img id="res-img-d"></div></div>
            
            <div class="score-board">
                <div class="score-item final" style="text-align: center;"><h4>綜合總分 (AI拉Curve)</h4><div class="val" id="s-final">0%</div></div>
            </div>
            
            <div class="funny-verdict-box">
                <div class="funny-label">AI 終極大會評語</div>
                <div class="funny-text" id="res-comment">...</div>
            </div>
            
            <div class="detail-bars">
                <h3 style="margin:0; text-align:center;">📊 深度分析數據</h3>
                <div class="detail-bars-grid">
                    <div class="bar-row"><div class="bar-label">🎨 毛色/髮色</div><div class="bar-bg"><div class="bar-fill" id="bar-color" style="background:#f1c40f;"></div></div><div class="bar-val" id="val-color">0%</div></div>
                    <div class="bar-row"><div class="bar-label">👀 眼神交流</div><div class="bar-bg"><div class="bar-fill" id="bar-eye" style="background:#3498db;"></div></div><div class="bar-val" id="val-eye">0%</div></div>
                    <div class="bar-row"><div class="bar-label">🏃 動作同步率</div><div class="bar-bg"><div class="bar-fill" id="bar-action" style="background:#e74c3c;"></div></div><div class="bar-val" id="val-action">0%</div></div>
                    <div class="bar-row"><div class="bar-label">🎭 氣質神態</div><div class="bar-bg"><div class="bar-fill" id="bar-vibe" style="background:#9b59b6;"></div></div><div class="bar-val" id="val-vibe">0%</div></div>
                    <div class="bar-row"><div class="bar-label">🍖 貪食基因</div><div class="bar-bg"><div class="bar-fill" id="bar-funny" style="background:#ff9ff3;"></div></div><div class="bar-val" id="val-funny">0%</div></div>
                </div>
            </div>

            <div class="action-btns-grid">
                <button class="main-btn" style="background:#000;" onclick="shareResultInstant()">📱 極速 Share (大會機專用)</button>
                <button class="main-btn sec-btn" onclick="switchView('view-upload')">🔄 重新影相</button>
                <button class="main-btn action-btn" style="grid-column: 1 / -1;" onclick="location.reload()">✅ 完成，下一位！</button>
            </div>
        </div>

        <!-- VIEW 4: RETRIEVE -->
        <div id="view-retrieve" class="view">
            <h2 style="text-align:center; color:var(--brand); margin-bottom:5px; font-size: 2rem;">📸 下載打卡靚相！</h2>
            <p style="text-align:center; color:#666; margin-top:0; font-size:1.1rem;">輸入您同主子嘅名，即可攞返成績圖！</p>
            <div class="input-group" style="margin-top: 30px;"><label>👤 人類名字</label><input type="text" id="ret-human" class="form-input" placeholder="例: 陳大文"></div>
            <div class="input-group"><label>🐶 狗狗名字</label><input type="text" id="ret-dog" class="form-input" placeholder="例: 旺財"></div>
            <div class="input-group"><label>📧 你的 Email</label><input type="email" id="ret-email" class="form-input" placeholder="example@gmail.com (必填)"></div>
            <button id="btn-fetch-cert" class="main-btn action-btn" style="padding: 25px; margin-top: 20px;" onclick="fetchAndRegisterCert()">✅ 搵相兼下載！</button>
        </div>

        <!-- VIEW 5: DOWNLOAD CENTER -->
        <div id="view-dl-center" class="view">
            <h2 style="text-align:center; color:var(--brand); margin-bottom:5px; font-size: 2rem;">🎉 搵到啦！</h2>
            <p style="font-size: 1.1rem; color: #888; margin-bottom: 20px; text-align: center; font-weight: bold;">💡 提示：請「長按圖片」儲存落手機相簿，或者撳下面按鈕下載！</p>

            <div class="dl-card" style="background: transparent; border: none; box-shadow: none;">
                <img id="dl-img-share" src="" alt="Share Image" style="max-width: 100%; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);">
                <div style="display:flex; flex-direction:column; gap:15px; margin-top:20px;">
                    <button class="main-btn action-btn" style="padding:20px;" onclick="triggerDownload('dl-img-share', 'AnimalsSum_Share.jpg')">📥 下載打卡圖</button>
                    <button class="main-btn" style="padding:20px; background:#000;" onclick="triggerShareFromDL()">📱 即時 Share (IG/FB)</button>
                </div>
            </div>
        </div>

    </div>

    <!-- IG Canvas -->
    <canvas id="shareCanvas" width="1080" height="1350" style="display:none;"></canvas>

    <script>
        if (!CanvasRenderingContext2D.prototype.roundRect) {
          CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
            this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
          }
        }

        const firebaseConfig = {
          apiKey: "AIzaSyAZNLy_ujHrFQQPmv5C_r2wlvptgXb2Enw",
          authDomain: "pet-human-alike.firebaseapp.com",
          projectId: "pet-human-alike",
          storageBucket: "pet-human-alike.firebasestorage.app",
          messagingSenderId: "285758735120",
          appId: "1:285758735120:web:27d2e9ac06d43cf66ddb95"
        };
        let db = null; try { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); } catch(e) {}

        let models = { coco: null, mobile: null };
        let aiReady = false;
        let state = { hName: '', dName: '', imgs: { h1:null, d1:null }, scores: {}, shareImgBlob: null };
        const dogKeywords =['dog', 'terrier', 'retriever', 'spaniel', 'shepherd', 'hound', 'wolf', 'poodle', 'collie', 'beagle', 'corgi', 'husky', 'schnauzer', 'bulldog', 'pug', 'shiba', 'akita', 'maltese', 'pomeranian', 'bichon'];

        document.fonts.ready.then(function() { console.log('Fonts loaded'); });

        window.addEventListener('DOMContentLoaded', async () => {
            if(window.location.hash === '#staffplay') { switchView('view-home'); } 
            else { switchView('view-retrieve'); }
        });

        async function loadAIinBackground() {
            try { models.coco = await cocoSsd.load(); models.mobile = await mobilenet.load(); aiReady = true;
                const statusEl = document.getElementById('ai-status'); statusEl.innerText = "✅ AI Ready"; statusEl.style.background = "rgba(84, 185, 124, 0.9)"; setTimeout(() => statusEl.style.display = 'none', 3000);
            } catch(e) { document.getElementById('ai-status').innerText = "❌ AI Error"; }
        }
        setTimeout(loadAIinBackground, 100);

        function switchView(viewId) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(viewId).classList.add('active'); window.scrollTo(0,0); }

        async function checkImg(e, imgId, bubbleId, targetRole) {
            const file = e.target.files[0]; if(!file) return;
            const img = document.getElementById(imgId); const bubble = document.getElementById(bubbleId); const box = document.getElementById('box-' + imgId.replace('img-',''));
            img.src = URL.createObjectURL(file); img.style.display = 'block'; box.classList.add('has-img'); box.querySelector('.placeholder').style.display = 'none'; box.querySelector('.cam-icon').style.display = 'none';
            bubble.style.display = 'block'; bubble.innerText = "🔍 AI 掃描中..."; bubble.className = "bubble warn";

            while(!aiReady) { bubble.innerText = "⏳ AI 啟動中...稍候"; await new Promise(r => setTimeout(r, 500)); }
            await new Promise(r => img.onload = r);
            
            const preds = await models.coco.detect(img); let msg = "", status = "err"; const minScore = 0.35; 

            if (targetRole === 'person') {
                if (preds.find(p => p.class === 'person' && p.score > minScore)) { status = "ok"; msg = "🏃‍♂️ 捕捉成功！"; } 
                else { msg = "❌ 搵唔到人/太濛！請重影"; }
            } else {
                let isDog = preds.find(p =>['dog','cat','bird','horse','bear','sheep'].includes(p.class) && p.score > minScore);
                if (!isDog && models.mobile) { const mobCheck = await models.mobile.classify(img); isDog = mobCheck.some(m => dogKeywords.some(k => m.className.toLowerCase().includes(k))); }
                if (isDog) { status = "ok"; msg = "💃 汪星人 OK！"; } 
                else { msg = "❌ 認唔到主子！請重影"; }
            }

            bubble.innerText = msg; bubble.className = "bubble " + status;
            if (status === "ok") state.imgs[imgId.replace('img-','').replace('-','')] = img; else { state.imgs[imgId.replace('img-','').replace('-','')] = null; box.classList.remove('has-img'); }
            checkAllReady();
        }

        function checkAllReady() {
            const btn = document.getElementById('btn-calc'); const hn = document.getElementById('human-name').value.trim(); const dn = document.getElementById('dog-name').value.trim();
            if(hn && dn && state.imgs.h1 && state.imgs.d1) { btn.disabled = false; state.hName = hn; state.dName = dn; } else { btn.disabled = true; }
        }

        function drawCroppedCircle(ctx, img, cx, cy, radius, borderColor, borderWidth) {
            ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2, true); ctx.closePath(); ctx.clip();
            const nw = img.naturalWidth || img.width; const nh = img.naturalHeight || img.height;
            const size = Math.min(nw, nh); const sx = (nw - size) / 2; const sy = (nh - size) / 2;
            ctx.drawImage(img, sx, sy, size, size, cx - radius, cy - radius, radius * 2, radius * 2); ctx.restore();
            if(borderWidth > 0) { ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.lineWidth = borderWidth; ctx.strokeStyle = borderColor; ctx.stroke(); }
        }

        function drawStrokedText(ctx, text, x, y, font, fillColor, strokeColor, lineWidth) {
            ctx.font = font; ctx.textAlign = 'center'; ctx.lineJoin = 'round';
            ctx.lineWidth = lineWidth; ctx.strokeStyle = strokeColor; ctx.strokeText(text, x, y);
            ctx.fillStyle = fillColor; ctx.fillText(text, x, y);
        }

        function genUniqueScore(min) {
            let usedScores = JSON.parse(localStorage.getItem('usedScores') || '[]');
            let score; let isDuplicate = true;
            while(isDuplicate) {
                score = parseFloat(((Math.random() * (99.999 - min)) + min).toFixed(3));
                if(!usedScores.includes(score)) isDuplicate = false;
            }
            usedScores.push(score);
            if(usedScores.length > 1000) usedScores.shift(); 
            localStorage.setItem('usedScores', JSON.stringify(usedScores));
            return score;
        }
        function genRandomScore(min) { return parseFloat(((Math.random() * (99.999 - min)) + min).toFixed(3)); }

        async function generateResults() {
            document.getElementById('loader').style.display = 'flex';

            setTimeout(async () => {
                let finalAvg = genUniqueScore(80);
                let colorS = genRandomScore(70); let eyeS = genRandomScore(80); let actionS = genRandomScore(80); let vibeS = genRandomScore(85); let funnyS = genRandomScore(88);
                state.scores = { final: finalAvg, c: colorS, e: eyeS, a: actionS, v: vibeS, f: funnyS };

                let comment = "";
                if(finalAvg >= 95) comment = "👼 靈魂共振！前世係同一個人！";
                else if(finalAvg >= 90) comment = "🧬 親如手足！根本係孖生兄弟！";
                else if(finalAvg >= 85) comment = "💕 前世情人！今世再續前緣！";
                else comment = "😎 最佳拍檔！默契十足天生一對！";
                state.comment = comment; 

                document.getElementById('res-names').innerText = `${state.hName} & ${state.dName}`;
                document.getElementById('res-comment').innerText = comment;
                document.getElementById('res-img-h').src = state.imgs.h1.src; document.getElementById('res-img-d').src = state.imgs.d1.src;

                animateValue('s-final', finalAvg);
                setTimeout(()=> { document.getElementById('bar-color').style.width = colorS+'%'; document.getElementById('val-color').innerText = colorS+'%'; document.getElementById('bar-eye').style.width = eyeS+'%'; document.getElementById('val-eye').innerText = eyeS+'%'; document.getElementById('bar-action').style.width = actionS+'%'; document.getElementById('val-action').innerText = actionS+'%'; document.getElementById('bar-vibe').style.width = vibeS+'%'; document.getElementById('val-vibe').innerText = vibeS+'%'; document.getElementById('bar-funny').style.width = funnyS+'%'; document.getElementById('val-funny').innerText = funnyS+'%'; }, 500);

                // ==========================================
                // 🔥 V26.1 IG Share 圖 (修正 Y 軸排版) 🔥
                // ==========================================
                const sCanvas = document.getElementById('shareCanvas'); const sCtx = sCanvas.getContext('2d');
                let grd = sCtx.createLinearGradient(0, 0, 1080, 1350); 
                grd.addColorStop(0, "#81ecec"); grd.addColorStop(1, "#54b97c");
                sCtx.fillStyle = grd; sCtx.fillRect(0,0,1080,1350);
                
                sCtx.strokeStyle = '#fff'; sCtx.lineWidth = 40; sCtx.strokeRect(20,20,1040,1310);
                sCtx.strokeStyle = '#FFD93D'; sCtx.lineWidth = 10; sCtx.strokeRect(40,40,1000,1270);

                // Logo
                const logoImg = document.getElementById('brand-logo');
                if(logoImg && logoImg.complete && logoImg.naturalWidth !== 0) {
                    const r = logoImg.naturalWidth / logoImg.naturalHeight; let dW = 300; let dH = dW / r;
                    if(dH > 100) { dH = 100; dW = dH * r; } sCtx.drawImage(logoImg, 1020 - dW, 55, dW, dH); 
                }
                
                // 標題
                drawStrokedText(sCtx, '🐾 AI人寵似樣大測試 🐾', 540, 150, '900 65px "Noto Sans TC", sans-serif', '#fff', '#d35400', 15);
                
                // 評語及大分數框
                sCtx.fillStyle = 'rgba(255,255,255,0.95)'; sCtx.beginPath(); sCtx.roundRect(80, 220, 920, 320, 40); sCtx.fill();
                drawStrokedText(sCtx, 'AI 終極大會評語', 540, 280, '900 35px "Noto Sans TC", sans-serif', '#888', '#fff', 0);
                drawStrokedText(sCtx, state.comment, 540, 350, '900 50px "Noto Sans TC", sans-serif', '#e74c3c', '#fff', 10);
                drawStrokedText(sCtx, `${state.scores.final}%`, 540, 500, '900 150px "Fredoka", sans-serif', '#54b97c', '#fff', 20);

                // 相片 VS
                try {
                    drawCroppedCircle(sCtx, state.imgs.h1, 300, 780, 220, '#fff', 18); 
                    drawCroppedCircle(sCtx, state.imgs.d1, 780, 780, 220, '#fff', 18);
                    drawStrokedText(sCtx, 'VS', 540, 820, 'italic 900 140px "Fredoka", sans-serif', '#FF6B6B', '#fff', 25);
                } catch(e) {}
                
                // 🔥 細項數據白框 (向上推 30px) 🔥
                sCtx.fillStyle = 'rgba(255,255,255,0.95)'; sCtx.beginPath(); sCtx.roundRect(80, 1030, 920, 230, 40); sCtx.fill();
                sCtx.fillStyle = '#555'; sCtx.font = 'bold 35px "Mochiy Pop One", "Noto Sans TC", sans-serif'; 
                
                // 🔥 內部數據 Y 軸向上推 30px 🔥
                sCtx.textAlign = 'left';
                sCtx.fillText(`🎨 顏色: ${state.scores.c}%`, 150, 1110);
                sCtx.fillText(`🏃 動作: ${state.scores.a}%`, 150, 1180);
                sCtx.fillText(`👀 眼神: ${state.scores.e}%`, 580, 1110);
                sCtx.fillText(`🎭 神態: ${state.scores.v}%`, 580, 1180);
                
                sCtx.textAlign = 'center';
                sCtx.fillText(`🍖 貪食基因: ${state.scores.f}%`, 540, 1240);

                // 🔥 加網址 (向上推 35px 去到安全區域) 🔥
                sCtx.fillStyle = '#fff';
                sCtx.font = 'bold 30px "Fredoka", sans-serif';
                sCtx.fillText('ANIMALSSUM.COM', 540, 1290);
                
                sCanvas.toBlob((b)=>{ state.shareImgBlob = b; }, 'image/jpeg', 0.8);
                const shareDataURL = sCanvas.toDataURL('image/jpeg', 0.7);

                const safeHName = state.hName.replace(/\s+/g, '').toLowerCase(); const safeDName = state.dName.replace(/\s+/g, '').toLowerCase();
                const docId = `${safeHName}_${safeDName}`;
                const record = { dogName: state.dName, humanName: state.hName, email: "", score: state.scores.final, shareImg: shareDataURL, timestamp: new Date().getTime() };
                
                if (db) { db.collection("certs").doc(docId).set(record).catch(e => { localStorage.setItem('cert_' + docId, JSON.stringify(record)); });
                } else { localStorage.setItem('cert_' + docId, JSON.stringify(record)); }

                document.getElementById('loader').style.display = 'none';
                switchView('view-result');
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
            }, 500); 
        }

        function animateValue(id, endVal) { let el = document.getElementById(id); let start = endVal - 2.000; let timer = setInterval(() => { start += 0.051; if(start >= endVal) { start = endVal; clearInterval(timer); } el.innerText = start.toFixed(3) + "%"; }, 30); }

        async function shareResultInstant() {
            if(!state.shareImgBlob) return alert("圖片準備中，請稍候...");
            const file = new File([state.shareImgBlob], "AnimalsSum_Share.jpg", { type: "image/jpeg" });
            const text = `我同 ${state.dName} 喺 AnimalsSum 配對挑戰中攞到 ${state.scores.final}%！\n快啲嚟挑戰啦！`;
            try {
                if (navigator.canShare && navigator.canShare({ files:[file] })) { await navigator.share({ title: 'AnimalsSum', text: text, files:[file] }); } 
                else { await navigator.share({ title: 'AnimalsSum', text: text, url: window.location.href }); }
            } catch(e) {}
        }

        async function triggerShareFromDL() {
            const imgSrc = document.getElementById('dl-img-share').src;
            if(!imgSrc || imgSrc === "") return alert("圖片載入中...");
            try {
                const res = await fetch(imgSrc); const blob = await res.blob();
                const file = new File([blob], "AnimalsSum_Share.jpg", { type: "image/jpeg" });
                const text = "我同狗狗喺 AnimalsSum 配對挑戰中攞到超高分！快啲嚟玩啦！";
                if (navigator.canShare && navigator.canShare({ files:[file] })) { await navigator.share({ title: 'AnimalsSum', text: text, files:[file] }); } 
                else { await navigator.share({ title: 'AnimalsSum', text: text, url: window.location.href }); }
            } catch(e) { alert("Share 失敗，請長按圖片儲存後自行分享！"); }
        }

        async function fetchAndRegisterCert() {
            const inputHuman = document.getElementById('ret-human').value.trim();
            const inputDog = document.getElementById('ret-dog').value.trim();
            const inputEmail = document.getElementById('ret-email').value.trim();
            
            if(!inputHuman || !inputDog || !inputEmail) return alert("❌ 請填寫所有資料！");
            if(!inputEmail.includes('@') || !inputEmail.includes('.')) return alert("❌ Email 格式不正確！");

            const safeHName = inputHuman.replace(/\s+/g, '').toLowerCase();
            const safeDName = inputDog.replace(/\s+/g, '').toLowerCase();
            const docId = `${safeHName}_${safeDName}`;

            const btn = document.getElementById('btn-fetch-cert'); btn.innerText = "⏳ 尋找及載入中..."; btn.disabled = true;
            let data = null;

            if (db) {
                try { const docRef = await db.collection("certs").doc(docId).get(); if(docRef.exists) { data = docRef.data(); await db.collection("certs").doc(docId).update({ email: inputEmail }); } } catch(e) {}
            }
            if(!data) {
                const dataStr = localStorage.getItem('cert_' + docId);
                if(dataStr) { data = JSON.parse(dataStr); data.email = inputEmail; localStorage.setItem('cert_' + docId, JSON.stringify(data)); }
            }

            if(data) {
                if(data.shareImg) document.getElementById('dl-img-share').src = data.shareImg;
                switchView('view-dl-center'); window.scrollTo(0,0);
            } else { alert("❌ 搵唔到你嘅記錄！請確保人類同狗狗名字打得啱。"); }
            btn.innerText = "✅ 搵相兼下載！"; btn.disabled = false;
        }

        function triggerDownload(imgId, filename) {
            const imgSrc = document.getElementById(imgId).src;
            if(!imgSrc || imgSrc === "") return alert("圖片加載中，請稍候...");
            let link = document.createElement('a'); link.download = filename; link.href = imgSrc; link.click();
        }
    </script>
