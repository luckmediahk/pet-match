<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ AnimalsSum | 大會後台系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        header { background: #2d3436; color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 1.8rem; }
        .status { background: #00b894; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; animation: pulse 2s infinite; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 25px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; background: #ddd; color: #555; transition: 0.3s; }
        .tab-btn.active { background: #54b97c; color: white; box-shadow: 0 5px 15px rgba(84, 185, 124, 0.3); }
        
        .view { display: none; }
        .view.active { display: block; }

        /* Print Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .cert-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; border-top: 5px solid #54b97c; }
        .cert-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .cert-img-box { width: 100%; aspect-ratio: 3/2; background: #eee; border-radius: 10px; overflow: hidden; margin-bottom: 15px; border: 1px solid #ddd; }
        .cert-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .info p { margin: 5px 0; font-size: 1rem; color: #555; }
        .code-tag { display: inline-block; background: #ffeaa7; color: #d63031; padding: 3px 10px; border-radius: 5px; font-weight: 900; font-size: 1.1rem; letter-spacing: 1px; }
        .print-btn { width: 100%; background: #0984e3; color: white; border: none; padding: 12px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        
        /* Data Table */
        .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: bold; color: #333; position: sticky; top: 0; }
        tr:hover { background: #f1f8f5; }
        .dl-csv-btn { background: #FFD93D; color: #333; border: none; padding: 10px 20px; font-size: 1rem; font-weight: bold; border-radius: 10px; cursor: pointer; float: right; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(255, 217, 61, 0.3); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @media print { body { background: white; padding: 0; } header, .tabs, .print-btn, .table-container { display: none !important; } }
    </style>
</head>
<body>

    <header>
        <h1>⚙️ 大會證書 Control Panel</h1>
        <div class="status">🟢 系統即時連線中 (Live Sync)</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('print-view', this)">🖨️ 現場列印中心</button>
        <button class="tab-btn" onclick="switchTab('data-view', this)">📋 參加者數據表</button>
    </div>

    <!-- VIEW 1: PRINT GRID -->
    <div id="print-view" class="view active">
        <div class="grid" id="cert-grid">
            <h2 style="color:#aaa; text-align:center; width:100%; grid-column: 1 / -1;">⏳ 等待參加者數據...</h2>
        </div>
    </div>

    <!-- VIEW 2: DATA TABLE -->
    <div id="data-view" class="view">
        <div class="table-container">
            <button class="dl-csv-btn" onclick="downloadCSV()">⬇️ 下載 Excel (CSV)</button>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>領取碼</th>
                        <th>人類名字</th>
                        <th>狗狗名字</th>
                        <th>AI 分數</th>
                        <th>聯絡 Email</th>
                        <th>遊玩時間</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data here -->
                </tbody>
            </table>
        </div>
    </div>
