<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ AnimalsSum | 大會秘密後台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        header { background: #2d3436; color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 1.8rem; }
        .status { background: #00b894; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; animation: pulse 2s infinite; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 25px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; background: #ddd; color: #555; transition: 0.3s; }
        .tab-btn.active { background: #54b97c; color: white; box-shadow: 0 5px 15px rgba(84, 185, 124, 0.3); }
        
        .view { display: none; }
        .view.active { display: block; }

        .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; vertical-align: middle; }
        th { background: #f8f9fa; font-weight: bold; color: #333; position: sticky; top: 0; }
        tr:hover { background: #f1f8f5; }
        .dl-csv-btn { background: #FFD93D; color: #333; border: none; padding: 10px 20px; font-size: 1rem; font-weight: bold; border-radius: 10px; cursor: pointer; float: right; margin-bottom: 15px; }
        .admin-avatars img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>⚙️ 大會證書 Control Panel</h1>
        <div class="status">🟢 即時連線中 (Live Sync)</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('data-view', this)">📋 參加者數據表 (有聯絡資料)</button>
    </div>

    <div id="data-view" class="view active">
        <div class="table-container">
            <button class="dl-csv-btn" onclick="downloadCSV()">⬇️ 下載 Excel (CSV)</button>
            <table id="data-table">
                <thead><tr><th>名次</th><th>相片</th><th>人類名 (狗名)</th><th>AI 分數</th><th>真實姓名</th><th>電話</th><th>Email</th><th>上榜時間</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAZNLy_ujHrFQQPmv5C_r2wlvptgXb2Enw",
          authDomain: "pet-human-alike.firebaseapp.com",
          projectId: "pet-human-alike",
          storageBucket: "pet-human-alike.firebasestorage.app",
          messagingSenderId: "285758735120",
          appId: "1:285758735120:web:27d2e9ac06d43cf66ddb95"
        };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore(); let allData =[]; 

        function switchTab(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(viewId).classList.add('active'); btn.classList.add('active');
        }

        db.collection("certs").where("public", "==", true).onSnapshot((snapshot) => {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; allData =[]; 

            if(snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">暫無數據</td></tr>'; return;
            }

            snapshot.forEach((doc) => { allData.push(doc.data()); });

            // Sort exactly like frontend leaderboard
            allData.sort((a,b) => {
                if(b.score !== a.score) return b.score - a.score;
                return (a.timestamp || 0) - (b.timestamp || 0);
            });

            allData.forEach((data, index) => {
                const rankStr = index + 1;
                const emailText = data.regEmail ? data.regEmail : "<span style='color:red;'>未提供</span>";
                const phoneText = data.regMobile ? data.regMobile : "<span style='color:red;'>未提供</span>";
                const realNameText = data.regName ? data.regName : "<span style='color:red;'>未提供</span>";
                const timeStr = (data.timestamp ? new Date(data.timestamp) : new Date()).toLocaleString('zh-HK');

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${rankStr}</strong></td>
                    <td class="admin-avatars"><img src="${data.humanImg || ''}"> <img src="${data.dogImg || ''}" style="margin-left:-15px;"></td>
                    <td>${data.humanName} & ${data.dogName}</td>
                    <td style="color:#54b97c; font-weight:bold;">${data.score}%</td>
                    <td>${realNameText}</td>
                    <td>${phoneText}</td>
                    <td>${emailText}</td>
                    <td style="color:#888; font-size:0.9rem;">${timeStr}</td>
                `;
                tbody.appendChild(tr);
            });
        });

        function downloadCSV() {
            if(allData.length === 0) return alert("無數據可供下載！");
            let csvContent = "\uFEFF名次,人類名,狗狗名,AI分數(%),真實姓名,電話,聯絡Email,遊玩時間\n";
            allData.forEach((row, index) => {
                const timeStr = (row.timestamp ? new Date(row.timestamp) : new Date()).toLocaleString('zh-HK').replace(/,/g, ''); 
                csvContent += `${index+1},${row.humanName},${row.dogName},${row.score},${row.regName||''},${row.regMobile||''},${row.regEmail||''},${timeStr}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `AnimalsSum_Top100_Data_${new Date().getTime()}.csv`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
