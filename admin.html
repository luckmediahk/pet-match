<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐶 AnimalsSum | 後台管理系統</title>
    
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #f4f6f8; margin: 0; padding: 20px; color: #333; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #54b97c; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        .export-btn { background: #e74c3c; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .export-btn:hover { background: #c0392b; }
        
        .stat-box { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #f0fdf4; border: 1px solid #54b97c; padding: 15px 20px; border-radius: 10px; flex: 1; text-align: center; }
        .stat-card h3 { margin: 0 0 5px 0; font-size: 1rem; color: #3da065; }
        .stat-card span { font-size: 2rem; font-weight: 900; color: #2d3436; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #54b97c; color: white; position: sticky; top: 0; }
        tr:hover { background: #f9f9f9; }
        
        .badge { background: #FFD93D; padding: 3px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; margin-left: 5px;}
        .img-preview { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; border: 1px solid #ddd; vertical-align: middle; margin-right: 8px;}
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>
            🐾 遊戲後台管理系統
            <button class="export-btn" onclick="exportToCSV()">📥 匯出 Excel (CSV)</button>
        </h1>
        
        <div class="stat-box">
            <div class="stat-card"><h3>總遊玩記錄</h3><span id="total-plays">0</span></div>
            <div class="stat-card"><h3>已登記抽獎人數</h3><span id="total-regs">0</span></div>
        </div>

        <div style="overflow-x: auto; max-height: 70vh;">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>分數</th>
                        <th>人類</th>
                        <th>主子</th>
                        <th>登記姓名</th>
                        <th>聯絡電話</th>
                        <th>電郵地址</th>
                        <th>IP 地址</th>
                        <th>遊玩時間</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="9" style="text-align:center;">載入數據中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 初始化 Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyAZNLy_ujHrFQQPmv5C_r2wlvptgXb2Enw",
          authDomain: "pet-human-alike.firebaseapp.com",
          projectId: "pet-human-alike",
          storageBucket: "pet-human-alike.firebasestorage.app",
          messagingSenderId: "285758735120",
          appId: "1:285758735120:web:27d2e9ac06d43cf66ddb95"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allData = [];

        async function loadData() {
            try {
                const snapshot = await db.collection("certs").orderBy("score", "desc").get();
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';
                
                let rank = 1;
                let regCount = 0;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    allData.push(data);
                    
                    if(data.regMobile) regCount++;

                    const dateObj = new Date(data.timestamp);
                    const timeStr = isNaN(dateObj) ? "未知" : dateObj.toLocaleString('zh-HK');

                    const regTag = data.regMobile ? `<span class="badge">已登記</span>` : '';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><b>#${rank}</b></td>
                        <td style="color:#54b97c; font-weight:bold;">${data.score}%</td>
                        <td><img src="${data.humanImg}" class="img-preview">${data.humanName}</td>
                        <td><img src="${data.dogImg}" class="img-preview">${data.dogName}</td>
                        <td>${data.regName || '-'} ${regTag}</td>
                        <td>${data.regMobile || '-'}</td>
                        <td>${data.regEmail || '-'}</td>
                        <td style="font-size:0.8rem; color:#888;">${data.ip || '未知'}</td>
                        <td style="font-size:0.8rem;">${timeStr}</td>
                    `;
                    tbody.appendChild(tr);
                    rank++;
                });

                document.getElementById('total-plays').innerText = allData.length;
                document.getElementById('total-regs').innerText = regCount;

            } catch(e) {
                console.error("載入失敗:", e);
                document.getElementById('table-body').innerHTML = `<tr><td colspan="9" style="color:red; text-align:center;">讀取資料失敗，請檢查權限或網絡連線。</td></tr>`;
            }
        }

        function exportToCSV() {
            if(allData.length === 0) return alert("無數據可匯出！");
            
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // 加入 BOM 防止中文亂碼
            csvContent += "排名,分數,人類名稱,毛孩名稱,動物種類,是否公開,登記姓名,登記電話,登記Email,來源,IP,遊玩時間\n";

            allData.forEach((row, index) => {
                const dateObj = new Date(row.timestamp);
                const timeStr = isNaN(dateObj) ? "" : dateObj.toLocaleString('zh-HK');
                
                // 清理欄位入面可能出現嘅逗號，避免 Excel 走位
                const clean = (str) => `"${(str || '').toString().replace(/"/g, '""')}"`;
                
                const rowData = [
                    index + 1, row.score, clean(row.humanName), clean(row.dogName), 
                    clean(row.petType), row.public ? "是" : "否", 
                    clean(row.regName), clean(row.regMobile), clean(row.regEmail),
                    clean(row.refSource), clean(row.ip), clean(timeStr)
                ];
                csvContent += rowData.join(",") + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `AnimalsSum_玩家名單_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 啟動載入
        loadData();
    </script>
</body>
</html>
