<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐶 AnimalsSum | 後台管理系統</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #f4f6f8; margin: 0; padding: 20px; color: #333; }
        .admin-container { max-width: 1300px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #5ba36a; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        .export-btn { background: #e74c3c; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .export-btn:hover { background: #c0392b; }
        
        .filter-box { background: #fdfbf7; border: 1px solid #facc50; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center;}
        .filter-box input[type="date"] { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit;}
        .filter-btn { background: #5ba36a; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;}
        .clear-btn { background: #95a5a6; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;}

        .stat-box { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #f0fdf4; border: 1px solid #5ba36a; padding: 15px 20px; border-radius: 10px; flex: 1; text-align: center; }
        .stat-card h3 { margin: 0 0 5px 0; font-size: 1rem; color: #458251; }
        .stat-card span { font-size: 2rem; font-weight: 900; color: #2d3436; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #5ba36a; color: white; position: sticky; top: 0; user-select: none; }
        tr:hover { background: #f9f9f9; }
        
        /* 🔥 加入可點擊排序的樣式 🔥 */
        .sortable { cursor: pointer; transition: background 0.2s; }
        .sortable:hover { background: #458251; }
        .sort-icon { font-size: 0.8rem; margin-left: 5px; opacity: 0.7; }
        .sortable.active .sort-icon { opacity: 1; }
        
        .badge { background: #FFD93D; padding: 3px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; margin-left: 5px;}
        .img-preview { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; border: 1px solid #ddd; vertical-align: middle; margin-right: 8px;}
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>
            🐾 遊戲後台管理系統
            <button class="export-btn" onclick="exportToCSV()">📥 匯出 Excel (CSV)</button>
        </h1>
        
        <div class="filter-box">
            <b>📅 篩選日期：</b>
            <label>由 <input type="date" id="filter-start"></label>
            <label>至 <input type="date" id="filter-end"></label>
            <button class="filter-btn" onclick="applyFilter()">篩選</button>
            <button class="clear-btn" onclick="clearFilter()">清除</button>
            
            <label style="margin-left: 15px; cursor: pointer; font-weight: bold; color: #e74c3c;">
                <input type="checkbox" id="filter-registered" onchange="applyFilter()"> ☑️ 只顯示已登記抽獎
            </label>
        </div>

        <div class="stat-box">
            <div class="stat-card"><h3>顯示數據量</h3><span id="total-plays">0</span></div>
            <div class="stat-card"><h3>已登記抽獎人數</h3><span id="total-regs">0</span></div>
        </div>

        <div style="overflow-x: auto; max-height: 70vh;">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>行數</th>
                        <!-- 🔥 加晒 onClick 排序功能，同埋上下箭嘴 🔥 -->
                        <th class="sortable active" onclick="sortTable('score', 'num')">分數 <span class="sort-icon" id="icon-score">⬇️</span></th>
                        <th class="sortable" onclick="sortTable('humanName', 'str')">人類 <span class="sort-icon" id="icon-humanName">↕️</span></th>
                        <th class="sortable" onclick="sortTable('dogName', 'str')">主子 <span class="sort-icon" id="icon-dogName">↕️</span></th>
                        <th class="sortable" onclick="sortTable('regName', 'str')">登記姓名 <span class="sort-icon" id="icon-regName">↕️</span></th>
                        <th class="sortable" onclick="sortTable('regMobile', 'str')">聯絡電話 <span class="sort-icon" id="icon-regMobile">↕️</span></th>
                        <th class="sortable" onclick="sortTable('regEmail', 'str')">電郵地址 <span class="sort-icon" id="icon-regEmail">↕️</span></th>
                        <th>IP / 來源</th>
                        <th class="sortable" onclick="sortTable('timestamp', 'num')">遊玩時間 <span class="sort-icon" id="icon-timestamp">↕️</span></th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="9" style="text-align:center;">載入數據中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAZNLy_ujHrFQQPmv5C_r2wlvptgXb2Enw", authDomain: "pet-human-alike.firebaseapp.com", projectId: "pet-human-alike", storageBucket: "pet-human-alike.firebasestorage.app", messagingSenderId: "285758735120", appId: "1:285758735120:web:27d2e9ac06d43cf66ddb95" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allData = [];
        let filteredData = [];
        
        // 🔥 排序控制變數 🔥
        let currentSort = { key: 'score', asc: false }; // 預設分數由高至低

        async function loadData() {
            try {
                const snapshot = await db.collection("certs").get();
                allData = [];
                snapshot.forEach(doc => {
                    let data = doc.data();
                    if(!data.timestamp) data.timestamp = 0;
                    allData.push(data);
                });
                
                filteredData = [...allData];
                executeSort(); // 載入後預設排序一次
                
            } catch(e) {
                console.error("載入失敗:", e);
                document.getElementById('table-body').innerHTML = `<tr><td colspan="9" style="color:red; text-align:center;">讀取資料失敗，請檢查權限或網絡連線。</td></tr>`;
            }
        }

        // 🔥 排序邏輯引擎 🔥
        function sortTable(key, type) {
            // 如果㩒同一個標題，反轉順序；如果㩒新標題，預設由高至低(或A-Z)
            if (currentSort.key === key) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.key = key;
                currentSort.asc = (type === 'str') ? true : false; 
            }
            
            // 更新 UI 箭嘴
            document.querySelectorAll('th.sortable').forEach(th => th.classList.remove('active'));
            document.querySelectorAll('.sort-icon').forEach(icon => icon.innerText = '↕️');
            
            const activeIcon = document.getElementById('icon-' + key);
            if(activeIcon) {
                activeIcon.innerText = currentSort.asc ? '⬆️' : '⬇️';
                activeIcon.parentElement.classList.add('active');
            }

            executeSort();
        }

        // 執行陣列排序並渲染
        function executeSort() {
            filteredData.sort((a, b) => {
                let valA = a[currentSort.key] || '';
                let valB = b[currentSort.key] || '';

                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();

                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            let rowNum = 1;
            let regCount = 0;

            filteredData.forEach(data => {
                if(data.regMobile) regCount++;

                const dateObj = new Date(data.timestamp);
                const timeStr = data.timestamp === 0 ? "未知" : dateObj.toLocaleString('zh-HK');
                const regTag = data.regMobile ? `<span class="badge">已登記</span>` : '';
                
                const hImg = data.humanImg ? `<img src="${data.humanImg}" class="img-preview" onerror="this.style.display='none'">` : '';
                const dImg = data.dogImg ? `<img src="${data.dogImg}" class="img-preview" onerror="this.style.display='none'">` : '';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:#aaa;">${rowNum}</td>
                    <td style="color:#5ba36a; font-weight:bold; font-size:1.1rem;">${data.score}%</td>
                    <td>${hImg}${data.humanName || '無名氏'}</td>
                    <td>${dImg}${data.dogName || '無名氏'}</td>
                    <td>${data.regName || '-'} ${regTag}</td>
                    <td>${data.regMobile || '-'}</td>
                    <td>${data.regEmail || '-'}</td>
                    <td style="font-size:0.8rem; color:#888;">${data.ip || '未知'}<br>${data.refSource ? `(${data.refSource})` : ''}</td>
                    <td style="font-size:0.8rem;">${timeStr}</td>
                `;
                tbody.appendChild(tr);
                rowNum++;
            });

            document.getElementById('total-plays').innerText = filteredData.length;
            document.getElementById('total-regs').innerText = regCount;
        }

        function applyFilter() {
            const startStr = document.getElementById('filter-start').value;
            const endStr = document.getElementById('filter-end').value;
            const onlyRegistered = document.getElementById('filter-registered').checked;
            
            const startTime = startStr ? new Date(startStr + "T00:00:00").getTime() : 0;
            const endTime = endStr ? new Date(endStr + "T23:59:59").getTime() : Infinity;

            filteredData = allData.filter(d => {
                let passTime = d.timestamp >= startTime && d.timestamp <= endTime;
                let passReg = onlyRegistered ? (d.regMobile && d.regMobile.trim() !== '') : true;
                return passTime && passReg;
            });
            executeSort(); // 篩選完重新套用目前嘅排序
        }

        function clearFilter() {
            document.getElementById('filter-start').value = "";
            document.getElementById('filter-end').value = "";
            document.getElementById('filter-registered').checked = false;
            filteredData = [...allData];
            executeSort();
        }

        function exportToCSV() {
            if(filteredData.length === 0) return alert("無數據可匯出！");
            
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "行數,分數,人類名稱,毛孩名稱,動物種類,是否公開,登記姓名,登記電話,登記Email,來源,IP,遊玩時間\n";

            filteredData.forEach((row, index) => {
                const dateObj = new Date(row.timestamp);
                const timeStr = row.timestamp === 0 ? "" : dateObj.toLocaleString('zh-HK');
                const clean = (str) => `"${(str || '').toString().replace(/"/g, '""')}"`;
                
                const rowData = [
                    index + 1, row.score, clean(row.humanName), clean(row.dogName), 
                    clean(row.petType), row.public ? "是" : "否", 
                    clean(row.regName), clean(row.regMobile), clean(row.regEmail),
                    clean(row.refSource), clean(row.ip), clean(timeStr)
                ];
                csvContent += rowData.join(",") + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `AnimalsSum_玩家名單_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        loadData();
    </script>
</body>
</html>
